services:
  - type: web
    name: paperape-api
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install && npm run build --workspace=@paperape/shared && npm run build --workspace=@paperape/api
    startCommand: node apps/api/dist/server.js
    envVars:
      - key: MOCK_MODE
        value: "true"
      - key: PORT
        value: "10000"
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGINS
        value: "https://paperape.vercel.app,https://paper-ape.vercel.app"
