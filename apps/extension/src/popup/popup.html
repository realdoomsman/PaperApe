<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PaperApe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0a0a14;
      color: #e0e0e0;
      width: 350px;
      min-height: 400px;
    }

    .popup {
      padding: 0;
    }

    /* Header */
    .header {
      background: linear-gradient(135deg, rgba(139, 92, 246, 0.2), rgba(236, 72, 153, 0.15));
      padding: 20px;
      text-align: center;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .logo {
      font-size: 36px;
      margin-bottom: 6px;
    }

    .title {
      font-size: 22px;
      font-weight: 700;
      background: linear-gradient(135deg, #8b5cf6, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 1px;
    }

    .tagline {
      font-size: 11px;
      color: #666;
      margin-top: 4px;
    }

    /* Auth Section */
    .auth-section {
      padding: 24px 20px;
    }

    .auth-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .auth-btn-primary {
      background: linear-gradient(135deg, #8b5cf6, #7c3aed);
      color: #fff;
      margin-bottom: 10px;
    }

    .auth-btn-primary:hover {
      box-shadow: 0 6px 20px rgba(139, 92, 246, 0.4);
      transform: translateY(-1px);
    }

    .auth-btn-secondary {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: #bbb;
    }

    .auth-btn-secondary:hover {
      background: rgba(255,255,255,0.1);
      color: #fff;
    }

    /* Dashboard Section */
    .dashboard {
      padding: 20px;
    }

    .user-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .user-name {
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 4px;
    }

    .user-balance {
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(135deg, #34d399, #10b981);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-top: 8px;
    }

    .user-balance-label {
      font-size: 10px;
      color: #666;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 16px;
    }

    .stat-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 10px;
      padding: 12px;
      text-align: center;
    }

    .stat-value {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
    }

    .stat-label {
      font-size: 9px;
      color: #666;
      letter-spacing: 1px;
      margin-top: 2px;
    }

    .stat-profit { color: #34d399 !important; }
    .stat-loss { color: #f87171 !important; }

    /* Settings */
    .settings {
      padding: 0 20px 20px;
    }

    .setting-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }

    .setting-label {
      font-size: 12px;
      color: #999;
    }

    .setting-value {
      font-size: 12px;
      font-weight: 600;
      color: #a78bfa;
    }

    select, input[type="number"] {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      padding: 4px 8px;
      color: #e0e0e0;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      width: 80px;
      text-align: right;
    }

    .logout-btn {
      width: 100%;
      padding: 10px;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      border-radius: 8px;
      color: #f87171;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 12px;
    }

    .logout-btn:hover {
      background: rgba(239, 68, 68, 0.2);
    }

    .hidden { display: none; }

    /* Status Indicator */
    .status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 10px;
      color: #666;
      padding: 8px 20px;
      border-top: 1px solid rgba(255,255,255,0.04);
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #10b981;
      animation: pulse 2s infinite;
    }

    .status-dot.disconnected {
      background: #ef4444;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
  </style>
</head>
<body>
  <div class="popup">
    <div class="header">
      <div class="logo">🦍</div>
      <div class="title">PaperApe</div>
      <div class="tagline">Simulate the trenches. Risk nothing.</div>
    </div>

    <!-- Login View -->
    <div id="auth-view" class="auth-section">
      <button class="auth-btn auth-btn-primary" id="login-google">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Sign in with Google
      </button>
      <button class="auth-btn auth-btn-secondary" id="login-apple">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
        Sign in with Apple
      </button>
    </div>

    <!-- Dashboard View -->
    <div id="dashboard-view" class="hidden">
      <div class="dashboard">
        <div class="user-card">
          <div class="user-name" id="user-name">Anon Ape</div>
          <div class="user-balance-label">PAPER BALANCE</div>
          <div class="user-balance" id="user-balance">100.0000 SOL</div>
        </div>

        <div class="stat-grid">
          <div class="stat-card">
            <div class="stat-value" id="open-positions">0</div>
            <div class="stat-label">OPEN POSITIONS</div>
          </div>
          <div class="stat-card">
            <div class="stat-value stat-profit" id="total-pnl">+0.00%</div>
            <div class="stat-label">TOTAL PNL</div>
          </div>
        </div>
      </div>

      <div class="settings">
        <div class="setting-row">
          <span class="setting-label">Default Buy Amount</span>
          <select id="default-buy">
            <option value="0.5">0.5 SOL</option>
            <option value="1" selected>1 SOL</option>
            <option value="2">2 SOL</option>
            <option value="5">5 SOL</option>
            <option value="10">10 SOL</option>
          </select>
        </div>
        <div class="setting-row">
          <span class="setting-label">Max Slippage</span>
          <input type="number" id="max-slippage" value="15" min="1" max="50" step="1"> %
        </div>
        <button class="logout-btn" id="logout-btn">Sign Out</button>
      </div>
    </div>

    <div class="status">
      <span class="status-dot" id="status-dot"></span>
      <span id="status-text">Ready</span>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
